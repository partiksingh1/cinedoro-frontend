<h2>Search Screenings by Date</h2>

<input type="date" [(ngModel)]="date">

<button (click)="search()">
    Search
</button>

<hr>

<div *ngFor="let screening of screenings">

    <p>Film ID: {{screening.filmId}}</p>

    <p>Date: {{screening.screeningDate}}</p>

    <p>Time: {{screening.screeningTime}}</p>

    <p>Price: {{screening.basePrice}}</p>

</div>
