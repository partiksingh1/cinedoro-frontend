<div class="admin-hall-container">
    <h2>Manage Halls</h2>

    <!-- Loading Indicator -->
    <div *ngIf="loading" class="loading">
        Loading halls...
    </div>

    <!-- No Halls Found Message -->
    <div *ngIf="!loading && halls.length === 0" class="no-halls-message">
        <p>No halls found. Create one to get started!</p>
    </div>

    <!-- Create New Hall Button -->
    <button *ngIf="!showCreateForm && !showEditForm" (click)="showCreateHallForm()" class="create-btn">
        Create New Hall
    </button>

    <!-- Create Hall Form -->
    <div *ngIf="showCreateForm" class="form-card">
        <h3>Create New Hall</h3>
        <form (ngSubmit)="createHall()">
            <div class="form-group">
                <label for="newName">Hall Name:</label>
                <input id="newName" [(ngModel)]="newHall.name" name="newName" required />
            </div>
            <div class="form-group">
                <label for="newCapacity">Capacity:</label>
                <input id="newCapacity" type="number" [(ngModel)]="newHall.capacity" name="newCapacity" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="save-btn">Create Hall</button>
                <button type="button" (click)="cancelCreate()" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Halls List -->
    <div *ngIf="!loading && halls.length > 0" class="halls-list">
        <h3>Existing Halls</h3>
        <div *ngFor="let hall of halls" class="hall-card">
            <div class="hall-info">
                <h4>{{ hall.name }}</h4>
                <p>Capacity: {{ hall.capacity }}</p>
            </div>
            <div class="hall-actions">
                <button (click)="showEditHallForm(hall)" class="edit-btn">Edit</button>
                <button (click)="deleteHall(hall.id!)" class="delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Edit Hall Form -->
    <div *ngIf="showEditForm && editHall" class="form-card">
        <h3>Edit Hall</h3>
        <form (ngSubmit)="updateHall()">
            <div class="form-group">
                <label for="editName">Hall Name:</label>
                <input id="editName" [ngModel]="editHall.name" (ngModelChange)="onEditInputChange($event, 'name')"
                    name="editName" required />
            </div>
            <div class="form-group">
                <label for="editCapacity">Capacity:</label>
                <input id="editCapacity" type="number" [ngModel]="editHall.capacity"
                    (ngModelChange)="onEditInputChange($event, 'capacity')" name="editCapacity" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="save-btn">Update Hall</button>
                <button type="button" (click)="cancelEdit()" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>
</div>
