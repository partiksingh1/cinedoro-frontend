<div class="admin-container">
    <div class="header">
        <h1 class="title">Manage Cinema Services</h1>
    </div>

    <!-- Loading -->
    <div *ngIf="loading()" class="loading">Loading services...</div>

    <!-- Services Table -->
    <div *ngIf="!loading() && cinemaServices().length > 0">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price ($)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let service of cinemaServices()">
                    <td>{{ service.name }}</td>
                    <td>{{ service.description }}</td>
                    <td>{{ service.price | number:'1.2-2' }}</td>
                    <td>
                        <button class="btn btn-edit" (click)="showEditServiceForm(service)">Edit</button>
                        <button class="btn btn-delete" (click)="deleteService(service.id!)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div *ngIf="!loading() && cinemaServices().length === 0" class="no-data">
        <p>No services found.</p>
    </div>

    <!-- Create Button -->
    <div class="text-center" *ngIf="!newService()">
        <button class="btn" (click)="showCreateServiceForm()">Add New Service</button>
    </div>

    <!-- Create Form -->
    <div *ngIf="newService()" class="admin-form">
        <h3>Create New Service</h3>
        <form (ngSubmit)="createService()">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" [(ngModel)]="newService().name" name="name" required />
            </div>
            <div class="form-group">
                <label>Description:</label>
                <textarea [(ngModel)]="newService().description" name="description" required></textarea>
            </div>
            <div class="form-group">
                <label>Price:</label>
                <input type="number" [(ngModel)]="newService().price" name="price" min="0" step="0.01" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Create</button>
                <button type="button" class="btn btn-cancel" (click)="cancelCreate()">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Edit Form -->
    <div *ngIf="editService()" class="admin-form">
        <h3>Edit Service</h3>
        <form (ngSubmit)="updateService()">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" [value]="editService()?.name" (input)="onEditInputChange($event, 'name')" required />
            </div>
            <div class="form-group">
                <label>Description:</label>
                <textarea [value]="editService()?.description" (input)="onEditInputChange($event, 'description')"
                    required></textarea>
            </div>
            <div class="form-group">
                <label>Price:</label>
                <input type="number" [value]="editService()?.price" (input)="onEditInputChange($event, 'price')" min="0"
                    step="0.01" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Update</button>
                <button type="button" class="btn btn-cancel" (click)="cancelEdit()">Cancel</button>
            </div>
        </form>
    </div>
</div>
