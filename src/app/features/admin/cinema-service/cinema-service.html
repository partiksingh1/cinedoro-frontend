<div class="cinema-service-container">
    <h2>Cinema Services</h2>

    <!-- Loading Indicator -->
    <div *ngIf="loading" class="loading">Loading services...</div>

    <!-- Service List -->
    <div *ngIf="!loading && cinemaServices.length > 0">
        <table class="services-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price ($)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let service of cinemaServices">
                    <td>{{ service.name }}</td>
                    <td>{{ service.description }}</td>
                    <td>{{ service.price | number:'1.2-2' }}</td>
                    <td>
                        <button class="btn edit-btn" (click)="showEditServiceForm(service)">Edit</button>
                        <button class="btn delete-btn" (click)="deleteService(service.id!)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div *ngIf="!loading && cinemaServices.length === 0">
        <p>No services found.</p>
    </div>

    <!-- Create Service Button -->
    <button class="btn create-btn" *ngIf="!showCreateForm" (click)="showCreateServiceForm()">Add New Service</button>

    <!-- Create Service Form -->
    <div *ngIf="showCreateForm" class="service-form">
        <h3>Create New Service</h3>
        <form (ngSubmit)="createService()">
            <label>
                Name:
                <input type="text" [(ngModel)]="newService.name" name="name" required />
            </label>
            <label>
                Description:
                <textarea [(ngModel)]="newService.description" name="description" required></textarea>
            </label>
            <label>
                Price:
                <input type="number" [(ngModel)]="newService.price" name="price" min="0" step="0.01" required />
            </label>
            <div class="form-actions">
                <button type="submit" class="btn submit-btn">Create</button>
                <button type="button" class="btn cancel-btn" (click)="cancelCreate()">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Edit Service Form -->
    <div *ngIf="showEditForm && editService" class="service-form">
        <h3>Edit Service</h3>
        <form (ngSubmit)="updateService()">
            <label>
                Name:
                <input type="text" [value]="editService.name" (input)="onEditInputChange($event, 'name')" required />
            </label>
            <label>
                Description:
                <textarea [value]="editService.description" (input)="onEditInputChange($event, 'description')"
                    required></textarea>
            </label>
            <label>
                Price:
                <input type="number" [value]="editService.price" (input)="onEditInputChange($event, 'price')" min="0"
                    step="0.01" required />
            </label>
            <div class="form-actions">
                <button type="submit" class="btn submit-btn">Update</button>
                <button type="button" class="btn cancel-btn" (click)="cancelEdit()">Cancel</button>
            </div>
        </form>
    </div>
</div>
