<div class="admin-container">
    <div class="header">
        <h1 class="title">Gestisci Servizi Cinema</h1>
    </div>

    <!-- Loading -->
    <div *ngIf="loading()" class="loading">Caricamento servizi...</div>

    <!-- Services Table -->
    <div *ngIf="!loading() && cinemaServices().length > 0">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Prezzo (€)</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let service of cinemaServices()">
                    <td>{{ service.name }}</td>
                    <td>{{ service.description }}</td>
                    <td>{{ service.price | number:'1.2-2' }}</td>
                    <td>
                        <button class="btn btn-edit" (click)="showEditServiceForm(service)">Modifica</button>
                        <button class="btn btn-delete" (click)="deleteService(service.id!)">Elimina</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div *ngIf="!loading() && cinemaServices().length === 0" class="no-data">
        <p>Nessun servizio trovato.</p>
    </div>

    <!-- Create Button -->
    <div class="text-center" *ngIf="!newService()">
        <button class="btn" (click)="showCreateServiceForm()">Aggiungi Nuovo Servizio</button>
    </div>

    <!-- Create Form -->
    <div *ngIf="newService()" class="admin-form">
        <h3>Crea Nuovo Servizio</h3>
        <form (ngSubmit)="createService()">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" [(ngModel)]="newService().name" name="name" required />
            </div>
            <div class="form-group">
                <label>Descrizione:</label>
                <textarea [(ngModel)]="newService().description" name="description" required></textarea>
            </div>
            <div class="form-group">
                <label>Prezzo:</label>
                <input type="number" [(ngModel)]="newService().price" name="price" min="0" step="0.01" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Crea</button>
                <button type="button" class="btn btn-cancel" (click)="cancelCreate()">Annulla</button>
            </div>
        </form>
    </div>

    <!-- Edit Form -->
    <div *ngIf="editService()" class="admin-form">
        <h3>Modifica Servizio</h3>
        <form (ngSubmit)="updateService()">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" [value]="editService()?.name" (input)="onEditInputChange($event, 'name')" required />
            </div>
            <div class="form-group">
                <label>Descrizione:</label>
                <textarea [value]="editService()?.description" (input)="onEditInputChange($event, 'description')"
                    required></textarea>
            </div>
            <div class="form-group">
                <label>Prezzo:</label>
                <input type="number" [value]="editService()?.price" (input)="onEditInputChange($event, 'price')" min="0"
                    step="0.01" required />
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Aggiorna</button>
                <button type="button" class="btn btn-cancel" (click)="cancelEdit()">Annulla</button>
            </div>
        </form>
    </div>
</div>
