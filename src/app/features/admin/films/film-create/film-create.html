<div class="container mt-4">

  <h2>Create Film</h2>

  <form (ngSubmit)="createFilm()">

    <div class="mb-3">
      <label class="form-label">Titolo</label>
      <input
        class="form-control"
        [(ngModel)]="film.title"
        name="title"
        required
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Descrizione</label>
      <textarea
        class="form-control"
        [(ngModel)]="film.description"
        name="description"
      ></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Durata (in minuti)</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="film.durationMinutes"
        name="durationMinutes"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Data d'uscita</label>
      <input
        type="date"
        class="form-control"
        [(ngModel)]="film.releaseDate"
        name="releaseDate"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Age Rating</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="film.ageRating"
        name="ageRating"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Regista</label>

      <select
        class="form-control"
        [(ngModel)]="film.director"
        name="director"
      >
        <option [ngValue]="null">Seleziona regista</option>

        <option
          *ngFor="let director of directors"
          [ngValue]="director"
        >
          {{ director.firstName }}
        </option>
      </select>

    </div>

    <button type="submit" class="btn btn-success">
      Aggiungi film
    </button>

  </form>

</div>
