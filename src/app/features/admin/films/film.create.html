<div class="admin-container">
    <div class="header">
        <h1 class="title">Create New Film</h1>
    </div>

    <form (ngSubmit)="createFilm()" class="admin-form">

        <div class="form-group">
            <label>Title *</label>
            <input type="text" [(ngModel)]="filmForm.title" name="title" required>
        </div>

        <div class="form-group">
            <label>Description *</label>
            <textarea rows="4" [(ngModel)]="filmForm.description" name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Duration (minutes) *</label>
            <input type="number" [(ngModel)]="filmForm.durationMinutes" name="durationMinutes" required>
        </div>

        <div class="form-group">
            <label>Release Date *</label>
            <input type="date" [(ngModel)]="filmForm.releaseDate" name="releaseDate" required>
        </div>

        <div class="form-group">
            <label>Age Rating</label>
            <input type="number" [(ngModel)]="filmForm.ageRating" name="ageRating">
        </div>

        <div class="form-group">
            <label>Director</label>
            <select [(ngModel)]="filmForm.directorId" name="director">
                <option [ngValue]="null">Select Director</option>
                <option *ngFor="let d of directors" [ngValue]="d.id">
                    {{ d.firstName }} {{ d.lastName }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Actors</label>
            <select multiple [(ngModel)]="filmForm.actorIds" name="actors">
                <option *ngFor="let a of actors" [ngValue]="a.id">
                    {{ a.firstName }} {{ a.lastName }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Genres</label>
            <select multiple [(ngModel)]="filmForm.genreIds" name="genres">
                <option *ngFor="let g of genres" [ngValue]="g.id">
                    {{ g.name }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*">
        </div>

        <div *ngIf="imagePreview" class="form-group">
            <label>Preview:</label>
            <img [src]="imagePreview" class="img-preview">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn" [disabled]="loading">
                {{ loading ? 'Creating...' : 'Create Movie' }}
            </button>
            <button type="button" class="btn btn-cancel" routerLink="/admin/films">
                Cancel
            </button>
        </div>

    </form>
</div>
