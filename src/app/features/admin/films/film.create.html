<div class="container mt-4">

    <h2>Create New Movie</h2>

    <form (ngSubmit)="createFilm()" class="film-form mt-3">

        <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" [(ngModel)]="filmForm.title" name="title" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description *</label>
            <textarea class="form-control" rows="4" [(ngModel)]="filmForm.description" name="description" required>
</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Duration (minutes) *</label>
            <input type="number" class="form-control" [(ngModel)]="filmForm.durationMinutes" name="durationMinutes"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Release Date *</label>
            <input type="date" class="form-control" [(ngModel)]="filmForm.releaseDate" name="releaseDate" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Age Rating</label>
            <input type="number" class="form-control" [(ngModel)]="filmForm.ageRating" name="ageRating">
        </div>

        <div class="mb-3">
            <label class="form-label">Director</label>
            <select class="form-control" [(ngModel)]="filmForm.directorId" name="director">

                <option [ngValue]="null">Select Director</option>

                <option *ngFor="let d of directors" [ngValue]="d.id">
                    {{ d.firstName }} {{ d.lastName }}
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Actors</label>
            <select multiple class="form-control" [(ngModel)]="filmForm.actorIds" name="actors">

                <option *ngFor="let a of actors" [ngValue]="a.id">
                    {{ a.firstName }} {{ a.lastName }}
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Genres</label>
            <select multiple class="form-control" [(ngModel)]="filmForm.genreIds" name="genres">

                <option *ngFor="let g of genres" [ngValue]="g.id">
                    {{ g.name }}
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Upload Image</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">
        </div>

        <div *ngIf="imagePreview" class="mb-3">

            <label>Preview:</label>

            <br>

            <img [src]="imagePreview" class="img-preview mt-2">

        </div>

        <div class="d-flex gap-2">

            <button type="submit" class="btn btn-success" [disabled]="loading">

                {{ loading ? 'Creating...' : 'Create Movie' }}

            </button>

            <button type="button" class="btn btn-secondary" routerLink="/admin/films">

                Cancel

            </button>

        </div>

    </form>

</div>
