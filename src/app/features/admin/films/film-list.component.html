<div class="admin-container">
    <div class="header">
        <h1 class="title">Manage Films</h1>
        <div class="actions">
            <input type="text" class="search-input" placeholder="Search movies..." [(ngModel)]="searchQuery">
            <button class="btn" (click)="searchFilms()">Search</button>
            <button class="btn" routerLink="/admin/films/create">Create Movie</button>
        </div>
    </div>

    <!-- Film Cards -->
    <div class="films-grid">
        <div class="film-card" *ngFor="let film of films$ | async">
            <div class="poster">
                <img *ngIf="film.imageUrl" [src]="'http://localhost:8080/api/film/images/' + film.imageUrl"
                    alt="{{ film.title }}">
                <div *ngIf="!film.imageUrl" class="poster-placeholder">
                    <span>{{ film.title.charAt(0) }}</span>
                </div>
            </div>
            <div class="film-content">
                <h3 class="film-title">{{ film.title }}</h3>
                <p class="film-description">{{ film.description }}</p>
                <div class="film-meta">
                    <span>Duration: {{ film.durationMinutes }} min</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-secondary" [routerLink]="['/screenings/film', film.id]">Screenings</button>
                    <button class="btn btn-edit" [routerLink]="['/admin/films/edit', film.id]">Edit</button>
                    <button class="btn btn-delete" (click)="deleteFilm(film.id!)">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- No films found -->
    <div *ngIf="(films$ | async)?.length === 0" class="no-data">
        No films found.
    </div>
</div>
