<div class="container mt-4">

    <!-- Header with search and create -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Movies</h2>
        <div class="d-flex gap-2">
            <input type="text" class="form-control" placeholder="Search movies..." [(ngModel)]="searchQuery">
            <button class="btn btn-primary" (click)="searchFilms()">Search</button>
            <button class="btn btn-success" routerLink="/admin/films/create">Create Movie</button>
        </div>
    </div>

    <!-- Film Cards -->
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let film of films$ | async">
            <div class="card h-100 shadow-sm">

                <img *ngIf="film.imageUrl" [src]="'http://localhost:8080/api/film/images/' + film.imageUrl"
                    class="card-img-top" alt="{{ film.title }}" style="height:200px; object-fit:cover;">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ film.title }}</h5>
                    <p class="card-text text-truncate">{{ film.description }}</p>
                    <p class="mb-2">Duration: {{ film.durationMinutes }} min</p>
                    <div class="mt-auto d-flex gap-2">
                        <button class="btn btn-primary flex-fill" [routerLink]="['/screenings/film', film.id]">View
                            Screenings</button>
                        <button class="btn btn-warning flex-fill"
                            [routerLink]="['/admin/films/edit', film.id]">Edit</button>
                        <button class="btn btn-danger flex-fill" (click)="deleteFilm(film.id!)">Delete</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- No films found -->
    <div *ngIf="(films$ | async)?.length === 0" class="alert alert-info text-center">
        No films found.
    </div>
</div>
