<div class="admin-container">
    <div class="header">
        <h1 class="title">Manage Directors</h1>
    </div>

    <div class="forms-container">
        <!-- Create Director Form -->
        <div class="admin-form">
            <h3>Add Director</h3>
            <form (ngSubmit)="createDirector()">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="firstName" [(ngModel)]="newDirector.firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="lastName" [(ngModel)]="newDirector.lastName" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Add</button>
                </div>
            </form>
        </div>

        <!-- Edit Director Form -->
        <div class="admin-form" *ngIf="editingDirector()">
            <h3>Edit Director</h3>
            <form (ngSubmit)="updateDirector()">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" [(ngModel)]="editingDirector()!.firstName" name="editFirstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" [(ngModel)]="editingDirector()!.lastName" name="editLastName" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Save</button>
                    <button type="button" class="btn btn-cancel" (click)="editingDirector.set(null)">Cancel</button>
                </div>
            </form>
        </div>
    </div>


    <h3 class="sub-title">Existing Directors</h3>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let director of directors()">
                <td>{{ director.id }}</td>
                <td>{{ director.firstName }}</td>
                <td>{{ director.lastName }}</td>
                <td>
                    <button class="btn btn-edit" (click)="startEditing(director)">Edit</button>
                    <button class="btn btn-delete" *ngIf="director.id"
                        (click)="deleteDirector(director.id)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
