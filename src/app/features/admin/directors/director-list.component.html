<div class="admin-container">
    <div class="header">
        <h1 class="title">Gestisci Registi</h1>
    </div>

    <div class="forms-container">
        <!-- Create Director Form -->
        <div class="admin-form">
            <h3>Aggiungi Regista</h3>
            <form (ngSubmit)="createDirector()">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="firstName" [(ngModel)]="newDirector.firstName" required>
                </div>
                <div class="form-group">
                    <label>Cognome</label>
                    <input type="text" name="lastName" [(ngModel)]="newDirector.lastName" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Aggiungi</button>
                </div>
            </form>
        </div>

        <!-- Edit Director Form -->
        <div class="admin-form" *ngIf="editingDirector()">
            <h3>Modifica Regista</h3>
            <form (ngSubmit)="updateDirector()">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" [(ngModel)]="editingDirector()!.firstName" name="editFirstName" required>
                </div>
                <div class="form-group">
                    <label>Cognome</label>
                    <input type="text" [(ngModel)]="editingDirector()!.lastName" name="editLastName" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Salva</button>
                    <button type="button" class="btn btn-cancel" (click)="editingDirector.set(null)">Annulla</button>
                </div>
            </form>
        </div>
    </div>


    <h3 class="sub-title">Registi Esistenti</h3>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Cognome</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let director of directors()">
                <td>{{ director.id }}</td>
                <td>{{ director.firstName }}</td>
                <td>{{ director.lastName }}</td>
                <td>
                    <button class="btn btn-edit" (click)="startEditing(director)">Modifica</button>
                    <button class="btn btn-delete" *ngIf="director.id"
                        (click)="deleteDirector(director.id)">Elimina</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
