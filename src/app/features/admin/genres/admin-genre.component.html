<div class="admin-container">
    <div class="header">
        <h1 class="title">Manage Genres</h1>
    </div>

    <!-- Create Genre Form -->
    <div class="admin-form">
        <h3>Add Genre</h3>
        <form (ngSubmit)="createGenre()">
            <div class="form-group">
                <label>Genre Name</label>
                <input type="text" placeholder="Genre name" [(ngModel)]="newGenre().name" name="genreName" required />
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">Add Genre</button>
            </div>
        </form>
    </div>

    <!-- Existing Genres Table -->
    <h3 class="sub-title">Existing Genres</h3>
    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Genre Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let genre of genres()">
                <td>{{ genre.id }}</td>
                <td>{{ genre.name }}</td>
                <td>
                    <button class="btn btn-delete" (click)="deleteGenre(genre.id)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
