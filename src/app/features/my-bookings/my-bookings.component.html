<div *ngFor="let b of bookings" class="booking-card">

    <h3>{{ b.filmTitle }}</h3>

    <p>
        {{ b.screeningDate }} - {{ b.screeningTime }}
    </p>

    <p>
        Total price: €{{ b.totalPrice }}
    </p>

    <p>
        Seats:
        <span *ngFor="let s of b.seats">
            Row {{ s.row }} Seat {{ s.number }}
        </span>
    </p>

</div>
