<div class="auth-container">
  <section class="card">
    <h2>Registrati</h2>

    <form #f="ngForm" (ngSubmit)="submit(f)">
      <div class="form-group">
        <label>Nome</label>
        <input name="firstName" [(ngModel)]="firstName" required minlength="2" />
      </div>

      <div class="form-group">
        <label>Cognome</label>
        <input name="lastName" [(ngModel)]="lastName" required minlength="2" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" [(ngModel)]="email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" [(ngModel)]="password" required minlength="6" />
      </div>

      <div class="form-group">
        <label>Conferma Password</label>
        <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" required />
        <small class="password-mismatch" *ngIf="confirmPassword && password !== confirmPassword">Le password non
          corrispondono</small>
      </div>

      <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Registrazione in corso...' : 'Crea Account' }}
      </button>

      <p class="muted">
        Hai già un account? <a routerLink="/login">Accedi</a>
      </p>
    </form>
  </section>
</div>
