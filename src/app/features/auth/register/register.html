<div class="auth-container">
  <section class="card">
    <h2>Register</h2>

    <form #f="ngForm" (ngSubmit)="submit(f)">
      <div class="form-group">
        <label>First Name</label>
        <input name="firstName" [(ngModel)]="firstName" required minlength="2" />
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input name="lastName" [(ngModel)]="lastName" required minlength="2" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" [(ngModel)]="email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" [(ngModel)]="password" required minlength="6" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" required />
        <small class="password-mismatch" *ngIf="confirmPassword && password !== confirmPassword">Passwords do not
          match</small>
      </div>

      <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Registering...' : 'Create Account' }}
      </button>

      <p class="muted">
        Already have an account? <a routerLink="/login">Login</a>
      </p>
    </form>
  </section>
</div>
