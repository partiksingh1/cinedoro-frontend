<div class="auth-container">
  <section class="card">
    <h2>Accesso</h2>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" [(ngModel)]="email" placeholder="Inserisci la tua email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" [(ngModel)]="password"
          placeholder="Inserisci la tua password" />
      </div>

      @if (errorMsg) {
      <p class="error">{{ errorMsg }}</p>
      }

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Accesso in corso...' : 'Accesso' }}
      </button>

      <p class="muted">
        Non hai un account?
        <a [routerLink]="['/register']">Registrati</a>
      </p>

    </form>
  </section>
</div>
