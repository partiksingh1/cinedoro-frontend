<div class="wizard-container">

    <!-- Header -->
    <div class="header">

        <div class="search-bar">
            <input type="text" placeholder="Cerca film..." [(ngModel)]="searchQuery" />

            <button (click)="searchFilms()">Cerca</button>
        </div>

    </div>

    <!-- Films Grid -->
    <section class="films-grid">
        <div class="film-card" *ngFor="let film of films$ | async">
            <!-- Poster -->
            <div class="poster">
                <img *ngIf="film.imageUrl; else noImage"
                    [src]="'http://localhost:8080/api/film/images/' + film.imageUrl" />
                <ng-template #noImage>
                    <div class="poster-placeholder">🎬</div>
                </ng-template>
                <div class="age-badge">{{ film.ageRating }}+</div>
            </div>

            <!-- Content -->
            <div class="film-content">
                <h2 class="film-title">{{ film.title }}</h2>
                <p class="film-description">{{ film.description }}</p>

                <!-- Meta -->
                <div class="film-meta">
                    <span><i class="clock-icon">⏱</i> {{ film.durationMinutes }} min</span>
                    <span><i class="calendar-icon">📅</i> {{ film.releaseDate | date:'yyyy' }}</span>
                </div>
                <!-- 
                <div class="film-director">
                    Regia di {{ film.director.firstName }} {{ film.director.lastName }}
                </div> -->

                <!-- Genres -->
                <div class="genres">
                    <span class="genre-badge" *ngFor="let g of film.genres">{{ g.name }}</span>
                </div>

                <!-- Screenings -->
                <!-- <div class="screenings">
                    <div class="screening-chip" *ngFor="let s of film.screenings" [routerLink]="['/booking', s.id]">
                        {{ s.screeningTime }}
                    </div>
                </div> -->

                <button class="primary-btn" [routerLink]="['/screenings/film', film.id]">
                    Vedi tutte le proiezioni
                </button>
            </div>
        </div>
    </section>

</div>
