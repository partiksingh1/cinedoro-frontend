<nav class="navbar">
    <div class="navbar-container">

        <a routerLink="/" class="logo">
            🎬 CineDoro
        </a>

        <ul class="nav-links">
            <li>
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
            </li>
            <li>
                <a routerLink="/films" routerLinkActive="active">Films</a>
            </li>
            <li>
                <a routerLink="/my-bookings" routerLinkActive="active">My Bookings</a>
            </li>
            <li *ngIf="isAdmin()">
                <a routerLink="/admin" routerLinkActive="active">Admin</a>
            </li>
        </ul>

        <div class="nav-right">
            <ng-container *ngIf="!authService.isLoggedIn(); else loggedIn">
                <a routerLink="/login" class="btn btn-secondary">Login</a>
                <a routerLink="/register" class="btn">Register</a>
            </ng-container>

            <ng-template #loggedIn>
                <span class="user-name">Welcome, {{ userName() }}</span>
                <button (click)="logout()" class="btn btn-logout">Logout</button>
            </ng-template>
        </div>

    </div>
</nav>
